        <p style="color:#94a3b8">Create AI agents that live on your server, remember everything, and work together. One process, one file, zero cloud.</p>
        <h2 style="margin-top:2rem;font-size:1.5rem">Why KinBot?</h2>
        <ul style="color:#94a3b8;line-height:2">
          <li><strong style="color:#e2e8f0">Persistent memory</strong> &mdash; Vector search + full-text across months of conversations</li>
          <li><strong style="color:#e2e8f0">Real identity</strong> &mdash; Each agent has a name, role, personality, and avatar</li>
          <li><strong style="color:#e2e8f0">Multi-agent collaboration</strong> &mdash; Agents delegate tasks and share context</li>
          <li><strong style="color:#e2e8f0">Autonomy</strong> &mdash; Cron jobs, webhooks, 6 messaging channels</li>
          <li><strong style="color:#e2e8f0">23+ AI providers</strong> &mdash; Including Ollama for fully local setups</li>
          <li><strong style="color:#e2e8f0">Self-hosted</strong> &mdash; One SQLite file, zero cloud dependency</li>
        </ul>
        <h2 style="margin-top:2rem;font-size:1.5rem">Quick Start</h2>
        <pre style="background:#1e293b;padding:1rem;border-radius:0.5rem;overflow-x:auto;color:#e2e8f0"><code>docker run -d --name kinbot -p 3000:3000 -v kinbot-data:/app/data ghcr.io/marlburrow/kinbot:latest</code></pre>
