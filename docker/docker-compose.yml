# KinBot Docker Compose
# Quick start:
#   ENCRYPTION_KEY=$(openssl rand -hex 32) docker compose up -d
#
# Configuration:
#   Copy ../.env.example to .env and customize, or set env vars inline.
#   See https://github.com/MarlBurroW/kinbot#configuration for all options.

services:
  kinbot:
    image: ghcr.io/marlburrow/kinbot:latest
    # To build from source instead of pulling the image, uncomment:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: kinbot
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - kinbot-data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - KINBOT_DATA_DIR=/app/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Uncomment to set the public-facing URL (needed for webhooks, invitations)
      # - PUBLIC_URL=https://kinbot.example.com
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  kinbot-data:
