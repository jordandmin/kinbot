name: Migration Test

on:
  push:
    branches: [main]
    paths:
      - 'src/server/db/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/server/db/**'

concurrency:
  group: migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-migrations:
    name: Test SQLite Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations on fresh DB
        run: |
          bun run -e "
          const { Database } = require('bun:sqlite');
          const { drizzle } = require('drizzle-orm/bun-sqlite');
          const { migrate } = require('drizzle-orm/bun-sqlite/migrator');
          const { mkdirSync } = require('fs');

          mkdirSync('/tmp/migration-test', { recursive: true });
          const sqlite = new Database('/tmp/migration-test/test.db');
          sqlite.run('PRAGMA journal_mode = WAL');
          sqlite.run('PRAGMA foreign_keys = ON');

          const db = drizzle(sqlite);
          migrate(db, { migrationsFolder: 'src/server/db/migrations' });

          // Verify tables exist
          const tables = sqlite.query(\"SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '__drizzle%' ORDER BY name\").all();
          console.log('Tables created:', tables.length);
          for (const t of tables) {
            console.log('  -', t.name);
          }

          if (tables.length === 0) {
            console.error('ERROR: No tables created after migrations');
            process.exit(1);
          }

          // Verify foreign keys are valid
          const fkErrors = sqlite.query('PRAGMA foreign_key_check').all();
          if (fkErrors.length > 0) {
            console.error('ERROR: Foreign key violations:', fkErrors);
            process.exit(1);
          }

          console.log('All', tables.length, 'tables created successfully, no FK violations');
          sqlite.close();
          "

      - name: Verify schema consistency
        run: |
          bun run -e "
          const { Database } = require('bun:sqlite');
          const { drizzle } = require('drizzle-orm/bun-sqlite');
          const { migrate } = require('drizzle-orm/bun-sqlite/migrator');

          // Run migrations twice to check idempotency
          const sqlite = new Database('/tmp/migration-test/test-idempotent.db');
          sqlite.run('PRAGMA journal_mode = WAL');
          sqlite.run('PRAGMA foreign_keys = ON');

          const db = drizzle(sqlite);
          migrate(db, { migrationsFolder: 'src/server/db/migrations' });
          migrate(db, { migrationsFolder: 'src/server/db/migrations' });

          console.log('Migrations are idempotent (ran twice without errors)');
          sqlite.close();
          "
