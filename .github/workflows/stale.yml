name: Stale Issues & PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest

    steps:
      - name: Stale action
        uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with
            no activity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            This pull request was closed because it has been stale for 14 days
            with no activity.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good first issue,help wanted
          exempt-pr-labels: pinned,security
          operations-per-run: 30
