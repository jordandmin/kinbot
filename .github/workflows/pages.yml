name: Deploy Sites

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs-site/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy sites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-site-${{ runner.os }}-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            bun-site-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-docs-${{ runner.os }}-${{ hashFiles('docs-site/package-lock.json') }}
          restore-keys: |
            npm-docs-${{ runner.os }}-

      - name: Build landing site
        run: cd site && bun install --frozen-lockfile && bun run build

      - name: Build docs site
        run: cd docs-site && npm install && npm run build

      - name: Merge outputs
        run: |
          mkdir -p merged
          cp -r site/dist/* merged/
          mkdir -p merged/docs
          cp -r docs-site/dist/* merged/docs/
          touch merged/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: merged
          clean-exclude: |
            e2e-report
            showcase
          commit-message: 'chore: update sites'
