name: Deploy Landing Site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy landing site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-site-${{ runner.os }}-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            bun-site-${{ runner.os }}-

      - name: Install dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Build
        run: cd site && bun run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site/dist
          clean-exclude: e2e-report
          commit-message: 'chore: update landing site'
