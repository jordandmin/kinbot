name: Store Plugins

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'store/**'
      - 'scripts/validate-store-plugins.ts'
  push:
    branches: [main]
    paths:
      - 'store/**'
      - 'scripts/validate-store-plugins.ts'

jobs:
  validate:
    name: Validate Store Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate store plugins
        run: bun scripts/validate-store-plugins.ts

      - name: Type-check store plugins
        run: |
          # Check that store plugin entry files have no import errors
          for dir in store/*/; do
            plugin=$(basename "$dir")
            main=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('${dir}plugin.json','utf-8')).main)" 2>/dev/null || echo "")
            if [ -n "$main" ] && [ -f "${dir}${main}" ]; then
              echo "Checking ${plugin}/${main}..."
              bunx tsc --noEmit --allowImportingTsExtensions --moduleResolution bundler --module esnext --target esnext "${dir}${main}" 2>&1 || true
            fi
          done
