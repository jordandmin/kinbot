# Configuration for actions/labeler
# Labels PRs based on changed file paths

"frontend":
  - changed-files:
      - any-glob-to-any-file: "src/client/**"

"backend":
  - changed-files:
      - any-glob-to-any-file: "src/server/**"

"shared":
  - changed-files:
      - any-glob-to-any-file: "src/shared/**"

"ci":
  - changed-files:
      - any-glob-to-any-file: ".github/**"

"docker":
  - changed-files:
      - any-glob-to-any-file:
          - "docker/**"
          - "Dockerfile"
          - "docker-compose*.yml"

"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "bun.lock"

"providers":
  - changed-files:
      - any-glob-to-any-file: "src/server/providers/**"

"channels":
  - changed-files:
      - any-glob-to-any-file: "src/server/channels/**"

"tools":
  - changed-files:
      - any-glob-to-any-file: "src/server/tools/**"

"database":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/db/**"
          - "drizzle.config.ts"

"tests":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.spec.ts"
          - "e2e/**"

"site":
  - changed-files:
      - any-glob-to-any-file: "site/**"

"i18n":
  - changed-files:
      - any-glob-to-any-file:
          - "src/client/locales/**"
          - "src/client/lib/i18n.ts"

"mini-apps":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/mini-app*"
          - "src/server/tools/mini-app*"
          - "src/server/routes/mini-app*"
          - "src/client/**/mini-app*"
          - "src/client/**/*MiniApp*"

"memory":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/memory*"
          - "src/server/tools/memory*"

"mcp":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/mcp*"
          - "src/server/tools/mcp*"
          - "src/server/routes/mcp*"
          - "src/client/**/mcp*"
          - "src/client/**/*Mcp*"
          - "src/client/**/*MCP*"

"webhooks":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/webhook*"
          - "src/server/routes/webhook*"
          - "src/client/**/webhook*"
          - "src/client/**/*Webhook*"

"cron":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/cron*"
          - "src/server/tools/cron*"
          - "src/server/routes/cron*"
          - "src/client/**/cron*"
          - "src/client/**/*Cron*"

"plugins":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/services/plugin*"
          - "src/server/routes/plugin*"
          - "src/client/**/plugin*"
          - "src/client/**/*Plugin*"

"store":
  - changed-files:
      - any-glob-to-any-file: "store/**"

"security":
  - changed-files:
      - any-glob-to-any-file:
          - "src/server/auth/**"
          - "src/server/services/vault*"
          - "SECURITY.md"
